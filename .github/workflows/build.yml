name: Build Windows .exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install bleak python-osc pyinstaller
      - name: Install winrt (optional, for media support)
        continue-on-error: true
        run: pip install winrt 2>$null

      # Build CLI version
      - run: pyinstaller --onefile --name hr_bridge hr_bridge.py

      # Build GUI version
      - run: pyinstaller --onefile --name "C20 HR Bridge" --windowed hr_bridge_gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: hr_bridge-windows
          path: |
            dist/hr_bridge.exe
            dist/C20 HR Bridge.exe
