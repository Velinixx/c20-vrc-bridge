name: Build Windows .exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install bleak python-osc pyinstaller

      - run: pyinstaller --onefile --name hr_bridge hr_bridge.py

      - uses: actions/upload-artifact@v4
        with:
          name: hr_bridge-windows
          path: dist/hr_bridge.exe
